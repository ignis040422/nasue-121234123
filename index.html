<!DOCTYPE html>
<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">

			<meta
				name="viewport"
				content="width=device-width, initial-scale=1.0"
    >

				<title>내수 웹맵</title>

				<link
					rel="icon"
					type="image/png"
					href="images/hanwol-icon.png"
    >

					<link
						rel="stylesheet"
						href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

						<style>
							@import url(
							'https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css'
							);

							* {
							box-sizing: border-box;
							}

							html,
							body {
							width: 100%;
							height: 100%;
							margin: 0;
							padding: 0;
							overflow: hidden;
							font-family: 'Pretendard', sans-serif;
							background: #161616;
							}

							button,
							input {
							font-family: inherit;
							}

							/* 지도 */
							#map {
							position: fixed;
							inset: 0;
							width: 100vw;
							height: 100vh;
							z-index: 1;
							background: #171717;
							}

							/* 상단 메뉴 */
							#controls-wrapper {
							position: fixed;
							top: 0;
							left: 0;
							z-index: 1500;

							width: 100%;
							height: 60px;

							display: flex;
							align-items: center;
							justify-content: space-between;

							padding: 0 16px;

							background: rgba(20, 17, 14, 0.94);
							border-bottom: 2px solid #6d5a4a;
							box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
							}

							.site-title {
							display: flex;
							align-items: center;
							gap: 9px;

							color: #d4af37;
							font-size: 18px;
							font-weight: 900;
							white-space: nowrap;
							}

							.site-title img {
							width: 34px;
							height: 34px;
							object-fit: contain;
							}

							.top-right-area {
							display: flex;
							align-items: center;
							gap: 10px;
							}

							/* 검색 */
							#search-wrapper {
							position: relative;
							}

							#search-input {
							width: 230px;
							height: 38px;

							padding: 0 12px;

							border: 2px solid #000;
							border-radius: 3px;

							background: #fff;
							color: #111;

							font-size: 13px;
							font-weight: 800;
							outline: none;

							box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.25);
							}

							#search-input:focus {
							border-color: #d4af37;
							}

							#search-results {
							display: none;

							position: absolute;
							top: 44px;
							left: 0;
							z-index: 3000;

							width: 280px;
							max-height: 360px;
							overflow-y: auto;

							background: #fff;
							border: 2px solid #000;
							border-radius: 3px;

							box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.25);
							}

							.search-result-item {
							padding: 10px 12px;

							border-bottom: 1px solid #ddd;

							color: #111;
							font-size: 13px;
							font-weight: 800;

							cursor: pointer;
							}

							.search-result-item:last-child {
							border-bottom: 0;
							}

							.search-result-item:hover {
							background: #fff6d5;
							}

							/* 메뉴 버튼 */
							#toggle-sidebar {
							height: 38px;

							display: flex;
							align-items: center;

							padding: 0 13px;

							background: #fff;
							border: 2px solid #000;
							border-radius: 3px;

							color: #111;
							font-size: 13px;
							font-weight: 900;
							white-space: nowrap;

							cursor: pointer;
							box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.25);
							}

							#toggle-sidebar:hover {
							border-color: #d4af37;
							}

							/* 오른쪽 메뉴 */
							#controls {
							position: fixed;
							top: 70px;
							right: 14px;
							z-index: 1400;

							width: 260px;
							max-height: calc(100vh - 85px);
							overflow-y: auto;

							padding: 14px;

							background: rgba(255, 255, 255, 0.97);
							border: 2px solid #000;
							border-radius: 4px;

							color: #111;

							box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.25);

							transform: translateX(calc(100% + 30px));
							transition: transform 0.25s ease;
							}

							#controls.active {
							transform: translateX(0);
							}

							#controls::-webkit-scrollbar {
							width: 7px;
							}

							#controls::-webkit-scrollbar-thumb {
							background: #6d5a4a;
							border-radius: 20px;
							}

							#controls::-webkit-scrollbar-track {
							background: #eee;
							}

							.control-header {
							margin-bottom: 13px;
							padding-bottom: 9px;

							border-bottom: 2px solid #000;
							}

							.control-title {
							margin: 0;

							color: #241c17;
							font-size: 17px;
							font-weight: 900;
							}

							.control-subtitle {
							margin-top: 4px;

							color: #777;
							font-size: 11px;
							font-weight: 700;
							}

							.control-group {
							margin-bottom: 14px;
							}

							.group-title {
							margin-bottom: 8px;

							color: #222;
							font-size: 13px;
							font-weight: 900;
							}

							.control-item {
							min-height: 32px;

							display: flex;
							align-items: center;

							margin-bottom: 5px;
							padding: 5px 6px;

							border-radius: 3px;

							color: #111;
							font-size: 13px;
							font-weight: 800;

							cursor: pointer;
							}

							.control-item:hover {
							background: #eee7d7;
							}

							.control-item input {
							width: 16px;
							height: 16px;

							margin: 0 9px 0 0;

							cursor: pointer;
							}

							.color-dot {
							width: 15px;
							height: 15px;

							margin-right: 9px;

							border: 1px solid #000;
							border-radius: 3px;
							}

							.divider {
							margin: 11px 0;
							border-top: 1px solid #c8c8c8;
							}

							/* 아코디언 */
							.accordion-header {
							display: flex;
							align-items: center;
							justify-content: space-between;

							padding: 9px 10px;

							background: #e7e7e7;
							border: 1px solid #000;
							border-radius: 3px;

							color: #111;
							font-size: 13px;
							font-weight: 900;

							cursor: pointer;
							}

							.accordion-header:hover {
							background: #ddd2bf;
							}

							.accordion-content {
							display: none;

							padding: 8px 5px;

							background: #fafafa;
							border: 1px solid #bbb;
							border-top: 0;
							}

							.accordion-content.active {
							display: block;
							}

							.reset-button {
							padding: 5px 8px;

							background: #fff;
							border: 2px solid #000;
							border-radius: 3px;

							color: #111;
							font-size: 11px;
							font-weight: 900;

							cursor: pointer;
							}

							.reset-button:hover {
							background: #eee;
							}

							/* 범례 */
							.legend-box {
							padding: 9px;

							background: #f5f5f5;
							border: 1px solid #ccc;
							border-radius: 3px;

							color: #555;
							font-size: 11px;
							font-weight: 700;
							line-height: 1.6;
							}

							/* 좌표 복사 알림 */
							#copy-toast {
							display: none;

							position: fixed;
							top: 82px;
							left: 50%;
							z-index: 20000;

							transform: translateX(-50%);

							align-items: center;
							gap: 8px;

							padding: 10px 20px;

							background: #ffd700;
							border: 2px solid #000;
							border-radius: 4px;

							color: #000;
							font-size: 13px;
							font-weight: 900;

							box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.3);
							}

							#copy-toast img {
							width: 24px;
							height: 24px;
							object-fit: contain;
							}

							/* Leaflet */
							.leaflet-control-zoom {
							border: 2px solid #000 !important;
							box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.25) !important;
							}

							.leaflet-popup-content-wrapper {
							border: 2px solid #000;
							border-radius: 4px;
							}

							.leaflet-popup-content {
							margin: 12px;
							}

							/* 모바일 */
							@media (max-width: 700px) {
							#controls-wrapper {
							height: auto;
							min-height: 60px;

							align-items: flex-start;
							gap: 8px;

							padding: 9px;
							}

							.site-title {
							font-size: 14px;
							}

							.site-title img {
							width: 30px;
							height: 30px;
							}

							.top-right-area {
							flex: 1;
							justify-content: flex-end;
							gap: 6px;
							}

							#search-input {
							width: 145px;
							}

							#search-results {
							left: auto;
							right: 0;
							width: 230px;
							}

							#toggle-sidebar {
							padding: 0 8px;
							font-size: 11px;
							}

							#controls {
							top: 68px;
							right: 8px;

							width: min(280px, calc(100vw - 16px));
							max-height: calc(100vh - 80px);
							}

							#copy-toast {
							top: 75px;
							}
							}

							@media (max-width: 470px) {
							.site-title span {
							display: none;
							}

							#search-input {
							width: 135px;
							}
							}
						</style>
					</head>

	<body>

		<!-- 지도 -->
		<div id="map"></div>


		<!-- 상단 메뉴 -->
		<header id="controls-wrapper">

			<div class="site-title">
				<img
					src="images/hanwol-icon.png"
					alt=""
					onerror="this.style.display='none'"
            >

					<span>한월 웹맵</span>
				</div>


			<div class="top-right-area">

				<div id="search-wrapper">
					<input
						type="text"
						id="search-input"
						placeholder="이름·번호·좌표 검색"
						autocomplete="off"
                >

						<div id="search-results"></div>
					</div>


				<button
					type="button"
					id="toggle-sidebar"
            >
					▲ 메뉴 닫기
				</button>

			</div>

		</header>


		<!-- 오른쪽 메뉴 -->
		<aside
			id="controls"
			class="active"
    >

			<div class="control-header">
				<h2 class="control-title">
					지도 표시 설정
				</h2>

				<div class="control-subtitle">
					원하는 종류만 지도에 표시할 수 있습니다.
				</div>
			</div>


			<!-- 주요 좌표 -->
			<section class="control-group">

				<div class="group-title">
					주요 좌표
				</div>

				<label class="control-item">
					<input
						type="checkbox"
						id="mine-녹"
                >

						<span
							class="color-dot"
							style="background:#2ecc71;"
                ></span>

						광산
					</label>


				<label class="control-item">
					<input
						type="checkbox"
						id="mine-청"
                >

						<span
							class="color-dot"
							style="background:#3498db;"
                ></span>

						약초 / 누룩
					</label>


				<label class="control-item">
					<input
						type="checkbox"
						id="mine-황"
                >

						<span
							class="color-dot"
							style="background:#f1c40f;"
                ></span>

						영단
					</label>


				<label class="control-item">
					<input
						type="checkbox"
						id="mine-적"
                >

						<span
							class="color-dot"
							style="background:#e74c3c;"
                ></span>

						보물
					</label>


				<label class="control-item">
					<input
						type="checkbox"
						id="check-job-centers"
                >

						<span
							class="color-dot"
							style="background:#fff;"
                ></span>

						전직소
					</label>

			</section>


			<div class="divider"></div>


			<!-- 사냥터 -->
			<section class="control-group">

				<div
					style="
                    display:flex;
                    gap:6px;
                    align-items:center;
                    margin-bottom:7px;
                "
            >

					<div
						class="accordion-header"
						id="hunt-accordion-btn"
						style="flex:1;"
                >
						<span>사냥터 목록</span>
						<span>▼</span>
					</div>

					<button
						type="button"
						id="reset-hunt"
						class="reset-button"
                >
						초기화
					</button>

				</div>


				<div
					class="accordion-content"
					id="hunt-accordion-content"
            ></div>

			</section>


			<div class="divider"></div>


			<!-- 범례 -->
			<section class="control-group">

				<div class="group-title">
					색상 안내
				</div>

				<div class="legend-box">
					녹색: 광산<br>
						청색: 약초 및 누룩<br>
							황색: 영단<br>
								적색: 보물<br>
									보라색: 사냥터<br>
                흰색: 전직소
            </div>

			</section>

		</aside>


		<!-- 좌표 복사 알림 -->
		<div id="copy-toast">

			<img
				src="images/forky.png"
				alt=""
				onerror="this.style.display='none'"
        >

				<span id="toast-text">
					좌표 복사 완료!
				</span>

			</div>


		<!-- Leaflet -->
		<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

		<!-- 프로젝트 파일 -->
		<script src="js/data.js"></script>
		<script src="js/map-logic.js"></script>
		<script src="js/ui-control.js"></script>


		<script>
			// =================================================
			// 사이드바 열기 / 닫기
			// =================================================

			const sidebar =
			document.getElementById("controls");

			const toggleSidebarButton =
			document.getElementById("toggle-sidebar");


			function updateSidebarButtonText() {
			if (!sidebar || !toggleSidebarButton) return;

			toggleSidebarButton.innerText =
			sidebar.classList.contains("active")
			? "▲ 메뉴 닫기"
			: "▼ 메뉴 열기";
			}


			function toggleSidebar() {
			if (!sidebar) return;

			sidebar.classList.toggle("active");

			updateSidebarButtonText();
			}


			if (toggleSidebarButton) {
			toggleSidebarButton.addEventListener(
			"click",
			function(event) {
			event.stopPropagation();
			toggleSidebar();
			}
			);
			}


			updateSidebarButtonText();


			// =================================================
			// 사냥터 아코디언
			// =================================================

			function bindAccordion(buttonId, contentId) {
			const button =
			document.getElementById(buttonId);

			const content =
			document.getElementById(contentId);

			if (!button || !content) return;

			button.addEventListener(
			"click",
			function(event) {
			event.stopPropagation();

			content.classList.toggle("active");

			const arrow =
			this.querySelector(
			"span:last-child"
			);

			if (arrow) {
			arrow.innerText =
			content.classList.contains("active")
			? "▲"
			: "▼";
			}
			}
			);
			}


			bindAccordion(
			"hunt-accordion-btn",
			"hunt-accordion-content"
			);


			// =================================================
			// 지도 클릭 처리
			// =================================================

			if (typeof map !== "undefined") {
			map.on("click", function() {
			const searchResults =
			document.getElementById(
			"search-results"
			);

			if (searchResults) {
			searchResults.style.display =
			"none";
			}

			if (
			window.innerWidth <= 700 &&
			sidebar &&
			sidebar.classList.contains("active")
			) {
			sidebar.classList.remove("active");
			updateSidebarButtonText();
			}
			});
			}


			// =================================================
			// ESC 처리
			// =================================================

			document.addEventListener(
			"keydown",
			function(event) {
			if (event.key !== "Escape") return;

			const searchResults =
			document.getElementById(
			"search-results"
			);

			if (searchResults) {
			searchResults.style.display =
			"none";
			}
			}
			);
		</script>

	</body>
</html>
